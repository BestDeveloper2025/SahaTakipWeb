server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend (host'taki sahatakip-app :3004)
    location ~ ^/(auth|admin|personnel|service|delivery|report|daily-log|location|customer|version|test-pdf|chronic-issue|remote-service-request|education-content|photo|education-type|education|uploads|apk|api)(/|$) {
        proxy_pass http://host.docker.internal:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
